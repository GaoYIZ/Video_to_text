spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/videoai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${VIDEOAI_DB_USERNAME:root}
    password: ${VIDEOAI_DB_PASSWORD:gao200039}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: videoai-producer-group

videoai:
  jwt:
    secret: VideoAIJwtSecretKeyPleaseChangeInProduction123456
    expire-seconds: 86400
  minio:
    enabled: false
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: videoai
  storage:
    local-base-path: data/storage
    temp-base-path: data/temp
  ffmpeg:
    command: ${VIDEOAI_FFMPEG:ffmpeg}
  ai:
    mock: ${VIDEOAI_AI_MOCK:false}
    base-url: ${VIDEOAI_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${VIDEOAI_AI_API_KEY:}
    model: ${VIDEOAI_AI_MODEL:qwen-plus}
    timeout-seconds: 60
    max-retries: 3
  asr:
    mock: ${VIDEOAI_ASR_MOCK:false}
    max-retries: 3
    python-command: ${VIDEOAI_ASR_PYTHON:python}
    script-path: ${VIDEOAI_ASR_SCRIPT:}
    model-name: ${VIDEOAI_ASR_MODEL:}
    language: ${VIDEOAI_ASR_LANGUAGE:zh-cn}
    device: ${VIDEOAI_ASR_DEVICE:cpu}
    compute-type: ${VIDEOAI_ASR_COMPUTE_TYPE:}
    cache-dir: ${VIDEOAI_ASR_CACHE_DIR:}
    beam-size: ${VIDEOAI_ASR_BEAM_SIZE:5}
  mq:
    enabled: false
    video-task-topic: video-task-topic
    retry-topic: video-retry-topic
