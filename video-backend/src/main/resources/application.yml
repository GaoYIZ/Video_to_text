server:
  port: 8080

spring:
  application:
    name: video-backend
  
  # MySQL 配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/video_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 自定义配置
video:
  upload:
    # 视频上传目录
    video-dir: ./uploads/videos
    # 音频输出目录
    audio-dir: ./uploads/audios
  ffmpeg:
    # FFmpeg 可执行文件路径(如果已加入环境变量则直接写 ffmpeg)
    path: ffmpeg

# AI Agent 配置
ai:
  agent:
    url: http://localhost:8000
